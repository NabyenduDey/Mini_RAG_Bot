services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./knowledge:/app/knowledge:ro
      - bot_data:/app/data
    depends_on:
      - ollama

volumes:
  ollama_data: {}
  bot_data: {}
